name = "transcribe-proxy"
main = "worker.js"
compatibility_date = "2026-01-01"

# Per-person hourly rate-limit store.
[[kv_namespaces]]
binding = "RATE"
id = "735edfa6a28f42c1bbac799e6d818015"

[vars]
RATE_PER_HOUR = "120"

# Secrets (never in this file):
#   wrangler secret put OPENAI_API_KEY   # the shared org key
#   wrangler secret put TEAM_TOKENS      # "name:token,name:token" — one per person
